name: Python checks

on:
  push:
    branches: [main, master]
    paths:
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/python-checks.yaml"
  pull_request:
    paths:
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - ".github/workflows/python-checks.yaml"

jobs:
  check:
    name: ty + ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --frozen --dev

      - name: ty
        run: uv run ty check scripts/

      - name: ruff
        run: uv run ruff check scripts/
