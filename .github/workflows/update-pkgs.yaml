name: Update Darwin Packages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: update-pkgs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-packages:
    name: Update Packages (darwin)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update flake inputs
        run: |
          nix flake update
          if ! git diff --quiet flake.lock; then
            git add flake.lock
            git commit -m "flake.lock: update"
          fi

      - name: Update packages
        uses: ./.github/actions/update-packages
        with:
          platform: darwin

      - name: Regenerate README package table
        shell: bash
        run: |
          set -euo pipefail
          nix develop --impure --command cog -r README.md
          if ! git diff --quiet README.md; then
            git add README.md
            git commit -m "docs(README.md): regenerate package table"
          fi

      - name: Push
        shell: bash
        run: |-
          set -euo pipefail
          git push --force-with-lease origin "HEAD:${{ github.ref_name }}"
